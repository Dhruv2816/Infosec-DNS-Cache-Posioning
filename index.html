<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Institute of Technology Jammu - Central Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #cf102d; /* A nice red to simulate university colors usually */
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #1e3a8a;
            bottom: -50px;
            right: -50px;
            border-radius: 50%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.1); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(207, 16, 45, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(207, 16, 45, 0.39);
        }

        .submit-btn:hover {
            background: #e11d48;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(207, 16, 45, 0.4);
        }

        .hacked-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: #dc2626;
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            z-index: 50;
            display: none;
            animation: slideDown 0.5s ease-out forwards;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        /* Demo Trigger Element */
        #triggerHacked {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255,255,255,0);
            cursor: default;
        }
    </style>
</head>
<body>
    <div class="hacked-banner" id="banner">
        ⚠️ ALERT: DNS CACHE POISONING ATTACK SUCCESSFUL - TRAFFIC INTERCEPTED ⚠️
    </div>

    <!-- Animated blobs for aesthetic -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-container">
        <div class="header">
            <h1>IIT Jammu Portal</h1>
            <p>Secure Academic Login</p>
        </div>

        <form onsubmit="showHack(event)">
            <div class="input-group">
                <label>Entry Number</label>
                <input type="text" placeholder="e.g. 2024CSB1001" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>
        <span id="triggerHacked" onclick="showHack(event)">.</span>
    </div>

    <script>
        // Simple JS to show hack banner when login is attempted
        function showHack(e) {
            e.preventDefault();
            document.getElementById('banner').style.display = 'block';
            document.querySelector('.submit-btn').innerHTML = 'CREDENTIALS STOLEN';
            document.querySelector('.submit-btn').style.background = '#000';
            document.querySelector('.submit-btn').style.color = '#dc2626';
            document.querySelector('.submit-btn').style.boxShadow = '0 0 20px #dc2626';
        }

        // For the WOW factor: automatically trigger the banner after 3 seconds 
        // to show the professor it's a compromised page immediately
        setTimeout(() => {
            document.getElementById('banner').style.display = 'block';
        }, 1500);
    </script>
</body>
</html>
